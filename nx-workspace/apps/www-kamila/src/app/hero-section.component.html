<section
  id="home"
  class="relative z-10 flex min-h-screen items-center overflow-hidden bg-[#faf9f6] px-5 pb-16 pt-28 shadow-[0_28px_80px_rgba(155,106,54,0.16)] lg:px-8 lg:pb-20"
>
  <img
    class="pointer-events-none absolute left-0 top-16 w-52 opacity-75 sm:w-72 lg:w-96"
    src="media/top-left-corner-plant.jpg"
    alt=""
  />
  <img
    class="pointer-events-none absolute bottom-0 right-0 w-56 opacity-70 sm:w-80 lg:w-[28rem]"
    src="media/bottom-right-corner-plant.jpeg"
    alt=""
  />

  <div
    class="relative mx-auto grid w-full max-w-7xl items-center gap-12 lg:grid-cols-[1.05fr_0.95fr]"
  >
    <div
      pAnimateOnScroll
      enterClass="reveal-rise"
      leaveClass="reveal-rise-out"
      threshold="0.4"
      rootMargin="0px 0px 140px 0px"
      [once]="true"
      class="max-w-3xl"
    >
      <p
        class="mb-5 inline-flex rounded-full border border-sage-green/25 bg-white/70 px-4 py-2 text-xs uppercase tracking-[0.28em] text-forest-green"
      >
        {{ 'hero.eyebrow' | translate }}
      </p>
      <h1
        class="mb-6 text-balance text-5xl font-semibold leading-[1.02] text-forest-green sm:text-6xl lg:text-7xl"
      >
        {{ 'hero.title' | translate }}
      </h1>
      <p class="max-w-2xl text-xl leading-8 text-charcoal/80">
        {{ 'hero.subtitle' | translate }}
      </p>
      <div class="mt-9 flex flex-col gap-4 sm:flex-row sm:items-center">
        <p-button
          [label]="'hero.cta' | translate"
          icon="pi pi-arrow-down"
          styleClass="cta-button"
          (onClick)="navigate.emit('philosophy')"
        ></p-button>
        <button
          class="secondary-cta inline-flex items-center gap-2 text-sm uppercase tracking-[0.2em] text-forest-green"
          type="button"
          (click)="navigate.emit('contact')"
        >
          {{ 'hero.secondaryCta' | translate }}
          <ng-icon name="tablerArrowRight" class="text-lg"></ng-icon>
        </button>
      </div>
    </div>

    <div
      pAnimateOnScroll
      enterClass="reveal-zoom scroll-delay-1"
      leaveClass="reveal-zoom-out"
      threshold="0.4"
      rootMargin="0px 0px 140px 0px"
      [once]="true"
      class="relative mx-auto mb-6 w-full max-w-xl lg:mb-0"
    >
      <div
        class="absolute -left-6 top-10 h-40 w-40 rounded-full bg-sage-green/20 blur-3xl"
      ></div>
      <div
        class="absolute -right-5 bottom-16 h-44 w-44 rounded-full bg-[#b47a3a]/18 blur-3xl"
      ></div>
      <div
        class="main-photo relative overflow-hidden rounded-[2rem] border border-[#b47a3a]/20 bg-white/55 p-3 shadow-2xl shadow-[#9b6a36]/15"
      >
        <img
          class="aspect-[4/5] w-full rounded-[1.5rem] object-cover"
          src="media/my-space.jpg"
          alt="Plant-filled interior with natural light"
        />
      </div>
    </div>
  </div>
</section>
